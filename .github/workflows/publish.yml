name: Publish to npm

# Manual npm publisher (workflow_dispatch only). Tests run without the optional
# CDP/Claude deps, mirroring ci.yml. Publishes with provenance.
# Requires the NPM_TOKEN repo secret (an all-packages + bypass-2FA token).

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --omit=optional --no-audit --no-fund
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
