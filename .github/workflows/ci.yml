name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # tests need only node-html-parser; the CDP + Claude paths are optional deps
      - run: npm install --omit=optional --no-audit --no-fund
      - run: npm test
